<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Le mie piante">
<meta name="theme-color" content="#f6faf0">
<title>Le mie piante</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --green-50: #f6faf0;
    --green-100: #e4f1d0;
    --green-200: #c6e09e;
    --green-400: #7eba42;
    --green-600: #3d7a1a;
    --green-800: #1e4a08;
    --amber-200: #fcd97a;
    --amber-600: #b07d10;
    --red-200: #fca5a5;
    --red-600: #c03030;
    --gray-50: #f9f9f7;
    --gray-100: #efefeb;
    --gray-200: #ddddd7;
    --gray-400: #999990;
    --gray-600: #555550;
    --gray-800: #222220;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --shadow-card: 0 1px 4px rgba(0,0,0,0.07), 0 0 0 0.5px rgba(0,0,0,0.06);
    --shadow-modal: 0 8px 40px rgba(0,0,0,0.18);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--green-50);
    color: var(--gray-800);
    min-height: 100dvh;
    -webkit-tap-highlight-color: transparent;
  }

  /* HEADER */
  .app-header {
    position: sticky; top: 0; z-index: 10;
    background: var(--green-50);
    border-bottom: 1px solid var(--green-100);
    padding: 1rem 1.25rem 0.875rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .app-title {
    font-family: 'DM Serif Display', serif;
    font-size: 24px; font-weight: 400;
    color: var(--green-800); letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 8px;
  }
  .app-subtitle { font-size: 12px; color: var(--gray-400); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 8px; }

  /* SYNC BUTTON */
  .btn-sync {
    display: flex; align-items: center; gap: 5px;
    background: none; border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    padding: 7px 12px; font-size: 13px; font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; color: var(--gray-600);
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .btn-sync:hover { background: var(--gray-100); border-color: var(--gray-400); }
  .btn-sync.connected { border-color: var(--green-200); color: var(--green-600); background: var(--green-50); }
  .btn-sync.syncing { opacity: 0.6; pointer-events: none; }
  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--gray-300); flex-shrink: 0;
  }
  .sync-dot.on { background: var(--green-400); }
  .sync-dot.spinning {
    border: 2px solid var(--green-200); border-top-color: var(--green-600);
    background: none; animation: spin 0.8s linear infinite;
    width: 9px; height: 9px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-add {
    display: flex; align-items: center; gap: 5px;
    background: var(--green-600); color: #fff;
    border: none; border-radius: var(--radius-sm);
    padding: 9px 15px; font-size: 14px; font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-add:active { background: var(--green-800); transform: scale(0.97); }

  /* MAIN */
  .main { padding: 1rem 1.25rem 6rem; }

  /* PLANT CARD */
  .plant-card {
    background: #fff; border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    padding: 1rem 1.25rem; margin-bottom: 0.875rem;
    position: relative; overflow: hidden;
  }
  .plant-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px; background: var(--green-200);
    border-radius: 4px 0 0 4px;
  }
  .plant-card.urgent::before { background: var(--amber-200); }
  .plant-card.overdue::before { background: var(--red-200); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
  .plant-name { font-size: 16px; font-weight: 500; color: var(--gray-800); display: flex; align-items: center; gap: 6px; }
  .plant-emoji { font-size: 20px; }
  .plant-species { font-size: 12px; color: var(--gray-400); margin-top: 2px; font-style: italic; }
  .card-actions { display: flex; gap: 4px; }
  .btn-icon {
    background: none; border: none; cursor: pointer;
    color: var(--gray-400); padding: 6px;
    border-radius: var(--radius-sm); font-size: 18px;
    transition: background 0.1s, color 0.1s; line-height: 1;
  }
  .btn-icon:hover { background: var(--gray-100); color: var(--gray-600); }

  .card-mid { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .water-last { font-size: 13px; color: var(--gray-600); }
  .water-last strong { color: var(--gray-800); font-weight: 500; }
  .water-days { font-size: 12px; color: var(--gray-400); margin-top: 1px; }

  .status-badge { font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
  .badge-ok { background: var(--green-100); color: var(--green-800); }
  .badge-urgent { background: #fff3cd; color: #7a5400; }
  .badge-overdue { background: #fde8e8; color: var(--red-600); }
  .badge-never { background: var(--gray-100); color: var(--gray-600); }

  .progress-wrap { height: 5px; background: var(--gray-100); border-radius: 99px; margin-bottom: 12px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 99px; transition: width 0.3s; background: var(--green-400); }
  .progress-bar.urgent { background: #f5b700; }
  .progress-bar.overdue { background: var(--red-200); width: 100% !important; }

  .history-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 11px; }
  .history-chip {
    font-size: 11px; color: var(--green-600);
    background: var(--green-50); border: 1px solid var(--green-100);
    padding: 3px 8px; border-radius: 20px;
    display: flex; align-items: center; gap: 3px;
  }

  .btn-water {
    width: 100%; padding: 10px;
    background: var(--green-50); border: 1.5px solid var(--green-200);
    border-radius: var(--radius-md); color: var(--green-800);
    font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-water:active { background: var(--green-100); transform: scale(0.98); }
  .btn-water.watered { background: var(--green-100); border-color: var(--green-400); }

  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--gray-400); }
  .empty-icon { font-size: 64px; margin-bottom: 1rem; display: block; }
  .empty-state h2 { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; color: var(--gray-600); margin-bottom: 0.5rem; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* MODAL */
  .overlay {
    display: none; position: fixed; inset: 0; z-index: 50;
    background: rgba(30,50,10,0.35); backdrop-filter: blur(3px);
    align-items: flex-end; justify-content: center;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    padding: 1.5rem 1.25rem calc(1.5rem + env(safe-area-inset-bottom, 0));
    width: 100%; max-width: 480px;
    box-shadow: var(--shadow-modal); animation: slideUp 0.22s ease-out;
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-handle { width: 36px; height: 4px; background: var(--gray-200); border-radius: 99px; margin: 0 auto 1.25rem; }
  .modal h2 { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; color: var(--green-800); margin-bottom: 1.25rem; }

  .form-group { margin-bottom: 1rem; }
  .form-group label { font-size: 13px; color: var(--gray-600); display: block; margin-bottom: 5px; font-weight: 500; }
  .form-group input, .form-group select {
    width: 100%; padding: 10px 12px;
    border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm);
    font-size: 15px; font-family: 'DM Sans', sans-serif;
    color: var(--gray-800); background: #fff; outline: none;
    transition: border-color 0.15s; -webkit-appearance: none; appearance: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--green-400); }

  .emoji-picker { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .emoji-btn {
    font-size: 24px; background: var(--gray-50);
    border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm);
    width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: border-color 0.1s, background 0.1s;
  }
  .emoji-btn.selected { border-color: var(--green-400); background: var(--green-50); }

  .modal-actions { display: flex; gap: 10px; margin-top: 1.25rem; }
  .modal-actions button {
    flex: 1; padding: 11px; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: background 0.1s, transform 0.1s; border: none;
  }
  .modal-actions button:active { transform: scale(0.97); }
  .btn-cancel-modal { background: var(--gray-100); color: var(--gray-600); }
  .btn-save-modal { background: var(--green-600); color: #fff; }

  /* FAB */
  .fab {
    position: fixed; bottom: calc(1.5rem + env(safe-area-inset-bottom, 0)); right: 1.5rem;
    width: 58px; height: 58px; background: var(--green-600); color: #fff;
    border: none; border-radius: 50%; font-size: 28px; cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, background 0.15s; z-index: 20;
  }
  .fab:active { transform: scale(0.93); background: var(--green-800); }

  /* TOAST */
  .toast {
    position: fixed; bottom: calc(5rem + env(safe-area-inset-bottom, 0));
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--gray-800); color: #fff;
    padding: 10px 8px 10px 18px; border-radius: 99px;
    font-size: 14px; font-weight: 500;
    opacity: 0; transition: all 0.25s; pointer-events: none;
    white-space: nowrap; z-index: 100;
    display: flex; align-items: center; gap: 10px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
  .toast-undo {
    background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.3);
    color: #fff; font-size: 13px; font-weight: 600;
    border-radius: 99px; padding: 4px 12px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: background 0.15s;
  }
  .toast-undo:hover { background: rgba(255,255,255,0.3); }

  /* DRIVE PANEL */
  .drive-panel {
    background: #fff; border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    padding: 1.5rem 1.25rem calc(1.5rem + env(safe-area-inset-bottom, 0));
    width: 100%; max-width: 480px;
    box-shadow: var(--shadow-modal); animation: slideUp 0.22s ease-out;
  }
  .drive-user { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
  .drive-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--green-100); display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0; overflow: hidden;
  }
  .drive-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .drive-name { font-size: 15px; font-weight: 500; color: var(--gray-800); }
  .drive-email { font-size: 12px; color: var(--gray-400); }
  .drive-actions { display: flex; flex-direction: column; gap: 10px; }
  .btn-drive {
    width: 100%; padding: 11px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.15s; border: none;
  }
  .btn-drive-upload { background: var(--green-600); color: #fff; }
  .btn-drive-upload:hover { background: var(--green-800); }
  .btn-drive-download { background: var(--green-50); color: var(--green-800); border: 1.5px solid var(--green-200); }
  .btn-drive-download:hover { background: var(--green-100); }
  .btn-drive-logout { background: var(--gray-100); color: var(--gray-600); }
  .btn-drive-logout:hover { background: var(--gray-200); }
  .drive-hint { font-size: 12px; color: var(--gray-400); text-align: center; margin-top: 4px; line-height: 1.5; }
  .drive-sep { height: 1px; background: var(--gray-100); margin: 4px 0; }

  /* HEATMAP */
  .heatmap-wrap {
    margin-bottom: 11px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .heatmap-inner {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: fit-content;
  }
  .heatmap-months {
    display: flex;
    gap: 2px;
    padding-left: 24px;
    margin-bottom: 2px;
    height: 14px;
  }
  .heatmap-month-label {
    font-size: 10px;
    color: var(--gray-400);
    white-space: nowrap;
    line-height: 14px;
    position: absolute;
  }
  .heatmap-rows {
    display: flex;
    gap: 2px;
  }
  .heatmap-day-labels {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-right: 4px;
    flex-shrink: 0;
  }
  .heatmap-day-label {
    font-size: 9px;
    color: var(--gray-400);
    height: 10px;
    line-height: 10px;
    width: 18px;
    text-align: right;
  }
  .heatmap-cols {
    display: flex;
    gap: 2px;
  }
  .heatmap-col {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .heatmap-cell {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    background: var(--gray-100);
    cursor: default;
    flex-shrink: 0;
    position: relative;
    transition: transform 0.1s;
  }
  .heatmap-cell:hover { transform: scale(1.3); z-index: 2; }
  .heatmap-cell.today { box-shadow: 0 0 0 1.5px var(--green-400); }
  .heatmap-cell.lvl-1 { background: #c6e09e; }
  .heatmap-cell.lvl-2 { background: #7eba42; }
  .heatmap-cell.lvl-3 { background: #3d7a1a; }
  .heatmap-cell.future { background: transparent; }
  .heatmap-footer {
    display: flex;
    align-items: center;
    gap: 4px;
    justify-content: flex-end;
    padding-top: 4px;
    font-size: 10px;
    color: var(--gray-400);
  }
  .heatmap-legend-cell {
    width: 10px; height: 10px;
    border-radius: 2px;
    background: var(--gray-100);
  }
  .heatmap-legend-cell.lvl-1 { background: #c6e09e; }
  .heatmap-legend-cell.lvl-2 { background: #7eba42; }
  .heatmap-legend-cell.lvl-3 { background: #3d7a1a; }

  /* Tooltip */
  .hm-tooltip {
    position: fixed;
    background: var(--gray-800);
    color: #fff;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 6px;
    pointer-events: none;
    z-index: 200;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .hm-tooltip.show { opacity: 1; }
</style>
</head>
<body>

<header class="app-header">
  <div>
    <div class="app-title"><span>🌿</span> Le mie piante</div>
    <div class="app-subtitle" id="subtitle">caricamento...</div>
  </div>
  <div class="header-right">
    <button class="btn-sync" id="btn-sync" onclick="openDrivePanel()">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-label">Drive</span>
    </button>
    <button class="btn-add" onclick="openModal()">＋ Aggiungi</button>
  </div>
</header>

<main class="main" id="plant-list"></main>

<button class="fab" onclick="openModal()" aria-label="Aggiungi pianta">＋</button>

<!-- Plant modal -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-title">Nuova pianta</h2>
    <div class="form-group">
      <label>Icona</label>
      <div class="emoji-picker" id="emoji-picker">
        <button class="emoji-btn selected" data-emoji="🪴" onclick="selectEmoji(this)">🪴</button>
        <button class="emoji-btn" data-emoji="🌿" onclick="selectEmoji(this)">🌿</button>
        <button class="emoji-btn" data-emoji="🌱" onclick="selectEmoji(this)">🌱</button>
        <button class="emoji-btn" data-emoji="🌵" onclick="selectEmoji(this)">🌵</button>
        <button class="emoji-btn" data-emoji="🌺" onclick="selectEmoji(this)">🌺</button>
        <button class="emoji-btn" data-emoji="🌻" onclick="selectEmoji(this)">🌻</button>
        <button class="emoji-btn" data-emoji="🍀" onclick="selectEmoji(this)">🍀</button>
        <button class="emoji-btn" data-emoji="🌳" onclick="selectEmoji(this)">🌳</button>
        <button class="emoji-btn" data-emoji="🎋" onclick="selectEmoji(this)">🎋</button>
        <button class="emoji-btn" data-emoji="🍃" onclick="selectEmoji(this)">🍃</button>
      </div>
    </div>
    <div class="form-group">
      <label>Nome</label>
      <input type="text" id="inp-name" placeholder="es. Basilico sul davanzale" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Specie (opzionale)</label>
      <input type="text" id="inp-species" placeholder="es. Ocimum basilicum" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Va innaffiata ogni</label>
      <select id="inp-freq">
        <option value="1">Ogni giorno</option>
        <option value="2">Ogni 2 giorni</option>
        <option value="3" selected>Ogni 3 giorni</option>
        <option value="5">Ogni 5 giorni</option>
        <option value="7">Una volta a settimana</option>
        <option value="10">Ogni 10 giorni</option>
        <option value="14">Ogni 2 settimane</option>
        <option value="30">Una volta al mese</option>
      </select>
    </div>
    <div class="form-group" id="form-group-last-watered">
      <label>Ultima innaffiatura (opzionale)</label>
      <input type="date" id="inp-last-watered">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeModal()">Annulla</button>
      <button class="btn-save-modal" onclick="savePlant()">Salva</button>
    </div>
  </div>
</div>

<!-- Drive panel -->
<div class="overlay" id="drive-overlay" onclick="handleDriveOverlayClick(event)">
  <div class="drive-panel">
    <div class="modal-handle"></div>
    <div id="drive-content"></div>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-msg"></span></div>
<div class="hm-tooltip" id="hm-tooltip"></div>

<script>
const CLIENT_ID = '595278972600-5nh69ar36qse8puiqghieu5561ult80b.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
const STORAGE_KEY = 'piante-v1';
const DRIVE_FILE_NAME = 'piante-backup.json';

let plants = [];
let editingId = null;
let selectedEmoji = '🪴';
let tokenClient = null;
let accessToken = null;
let driveFileId = null;
let googleUser = null;

// --- Local storage ---
function load() {
  try { plants = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { plants = []; }
  try { accessToken = localStorage.getItem('gd_token') || null; } catch(e) {}
  try { googleUser = JSON.parse(localStorage.getItem('gd_user') || 'null'); } catch(e) {}
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(plants));
}

// --- Helpers ---
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function daysSince(iso) {
  if (!iso) return null;
  return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
}
function formatDate(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  const today = new Date(); today.setHours(0,0,0,0);
  const yest = new Date(today); yest.setDate(yest.getDate()-1);
  const dd = new Date(d); dd.setHours(0,0,0,0);
  if (dd.getTime() === today.getTime()) return 'oggi';
  if (dd.getTime() === yest.getTime()) return 'ieri';
  return d.toLocaleDateString('it-IT', {day:'numeric', month:'short'});
}
function getStatus(p) {
  const d = daysSince(p.lastWatered);
  if (d === null) return { label: 'mai innaffiata', badge: 'badge-never', card: '' };
  const ratio = d / p.freq;
  if (ratio < 0.75) return { label: 'ok 🌱', badge: 'badge-ok', card: '' };
  if (ratio < 1.1)  return { label: 'innaffia presto', badge: 'badge-urgent', card: 'urgent' };
  return { label: 'ha sete! 💧', badge: 'badge-overdue', card: 'overdue' };
}
function getProgress(p) {
  const d = daysSince(p.lastWatered);
  if (d === null) return { pct: 0, cls: '' };
  const pct = Math.min(100, Math.round(d / p.freq * 100));
  return { pct, cls: pct >= 110 ? 'overdue' : pct >= 75 ? 'urgent' : '' };
}

// --- Render ---
function render() {
  const list = document.getElementById('plant-list');
  const sub = document.getElementById('subtitle');
  const overdue = plants.filter(p => { const d = daysSince(p.lastWatered); return d !== null && d / p.freq >= 1; }).length;
  sub.textContent = plants.length === 0
    ? 'nessuna pianta'
    : `${plants.length} pianta${plants.length>1?'e':''}${overdue ? ` · ${overdue} da innaffiare` : ''}`;

  if (plants.length === 0) {
    list.innerHTML = `<div class="empty-state"><span class="empty-icon">🌿</span><h2>Nessuna pianta ancora</h2><p>Tocca il <strong>+</strong> per aggiungere la tua prima pianta.</p></div>`;
    return;
  }
  const sorted = [...plants].sort((a,b) => {
    const ra = (daysSince(a.lastWatered) ?? 999) / a.freq;
    const rb = (daysSince(b.lastWatered) ?? 999) / b.freq;
    return rb - ra;
  });
  list.innerHTML = sorted.map(p => {
    const st = getStatus(p);
    const pr = getProgress(p);
    const ds = daysSince(p.lastWatered);
    const lastLabel = p.lastWatered
      ? `<strong>${formatDate(p.lastWatered)}</strong>` + (ds > 0 ? ` <span style="color:var(--gray-400);font-size:12px">(${ds}g fa)</span>` : '')
      : '<span style="color:var(--gray-400)">mai</span>';
    const history = (p.history || []).slice(-5).reverse()
      .map(h => `<span class="history-chip"><span>💧</span>${formatDate(h)}</span>`).join('');
    return `<div class="plant-card ${st.card}" data-id="${p.id}">
      <div class="card-top">
        <div>
          <div class="plant-name"><span class="plant-emoji">${p.emoji||'🪴'}</span>${p.name}</div>
          ${p.species ? `<div class="plant-species">${p.species}</div>` : ''}
        </div>
        <div class="card-actions">
          <button class="btn-icon" onclick="editPlant('${p.id}')" aria-label="Modifica">✏️</button>
          <button class="btn-icon" onclick="deletePlant('${p.id}')" aria-label="Elimina">🗑</button>
        </div>
      </div>
      <div class="card-mid">
        <div>
          <div class="water-last">Ultima volta: ${lastLabel}</div>
          <div class="water-days">ogni ${p.freq} giorn${p.freq===1?'o':'i'}</div>
        </div>
        <span class="status-badge ${st.badge}">${st.label}</span>
      </div>
      <div class="progress-wrap"><div class="progress-bar ${pr.cls}" style="width:${pr.pct}%"></div></div>
      ${buildHeatmap(p)}
      <button class="btn-water${p.lastWatered && daysSince(p.lastWatered)===0?' watered':''}" onclick="waterPlant('${p.id}')">
        💧 ${p.lastWatered && daysSince(p.lastWatered)===0 ? 'Innaffiata oggi ✓' : 'Innaffia ora'}
      </button>
    </div>`;
  }).join('');
}

// --- Actions ---
function waterPlant(id) {
  const p = plants.find(x => x.id === id);
  if (!p) return;
  if (p.lastWatered && daysSince(p.lastWatered) === 0) {
    p.lastWatered = (p.history||[]).slice(-2,-1)[0] || null;
    p.history = (p.history||[]).slice(0,-1);
    save(); render();
    showToast(`${p.emoji||'🌱'} ${p.name} rimossa da oggi`);
  } else {
    const now = new Date().toISOString();
    p.lastWatered = now;
    p.history = [...(p.history||[]), now].slice(-10);
    save(); render();
    showToast(`${p.emoji||'🌱'} ${p.name} innaffiata!`);
  }
}

function deletePlant(id) {
  const p = plants.find(x => x.id === id);
  if (!p) return;
  const snapshot = JSON.parse(JSON.stringify(plants));
  plants = plants.filter(x => x.id !== id);
  save(); render();
  showToast(`${p.emoji||'🌱'} ${p.name} eliminata`, () => { plants = snapshot; save(); render(); });
}

function editPlant(id) { openModal(id); }

// --- Modal ---
function selectEmoji(btn) {
  document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedEmoji = btn.dataset.emoji;
}
function openModal(id) {
  editingId = id || null;
  selectedEmoji = '🪴';
  document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector('.emoji-btn[data-emoji="🪴"]').classList.add('selected');
  const lastWateredGroup = document.getElementById('form-group-last-watered');
  if (id) {
    const p = plants.find(x => x.id === id);
    document.getElementById('modal-title').textContent = 'Modifica pianta';
    document.getElementById('inp-name').value = p.name;
    document.getElementById('inp-species').value = p.species || '';
    document.getElementById('inp-freq').value = p.freq;
    selectedEmoji = p.emoji || '🪴';
    const eb = document.querySelector(`.emoji-btn[data-emoji="${selectedEmoji}"]`);
    if (eb) eb.classList.add('selected');
    lastWateredGroup.style.display = 'none'; // hide when editing
  } else {
    document.getElementById('modal-title').textContent = 'Nuova pianta';
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-species').value = '';
    document.getElementById('inp-freq').value = '3';
    document.getElementById('inp-last-watered').value = '';
    lastWateredGroup.style.display = '';
  }
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('inp-name').focus(), 100);
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }
function savePlant() {
  const name = document.getElementById('inp-name').value.trim();
  if (!name) { document.getElementById('inp-name').focus(); return; }
  const freq = parseInt(document.getElementById('inp-freq').value);
  const species = document.getElementById('inp-species').value.trim();
  if (editingId) {
    const p = plants.find(x => x.id === editingId);
    p.name = name; p.species = species; p.freq = freq; p.emoji = selectedEmoji;
  } else {
    const lastWateredVal = document.getElementById('inp-last-watered').value;
    let lastWatered = null;
    let history = [];
    if (lastWateredVal) {
      // Create ISO string at noon to avoid timezone issues
      lastWatered = new Date(lastWateredVal + 'T12:00:00').toISOString();
      history = [lastWatered];
    }
    plants.push({ id: uid(), name, species, freq, emoji: selectedEmoji, lastWatered, history });
  }
  save(); closeModal(); render();
}

// --- Heatmap ---
function buildHeatmap(plant) {
  const WEEKS = 18; // ~4 months
  const today = new Date(); today.setHours(0,0,0,0);

  // Build a Set of watered dates (YYYY-MM-DD)
  const wateredDates = new Set();
  const allEntries = [...(plant.history || [])];
  if (plant.lastWatered && !allEntries.includes(plant.lastWatered)) allEntries.push(plant.lastWatered);
  allEntries.forEach(iso => {
    const d = new Date(iso); d.setHours(0,0,0,0);
    wateredDates.add(d.toISOString().slice(0,10));
  });

  // Start from WEEKS*7 days ago, aligned to Monday
  const startDate = new Date(today);
  startDate.setDate(startDate.getDate() - (WEEKS * 7 - 1));
  // Align to Monday
  const dow = startDate.getDay(); // 0=Sun
  const offset = dow === 0 ? -6 : 1 - dow;
  startDate.setDate(startDate.getDate() + offset);

  // Build columns (weeks), each with 7 days (Mon-Sun)
  const cols = [];
  let cur = new Date(startDate);
  for (let w = 0; w < WEEKS; w++) {
    const col = [];
    for (let d = 0; d < 7; d++) {
      col.push(new Date(cur));
      cur.setDate(cur.getDate() + 1);
    }
    cols.push(col);
  }

  // Month labels
  const monthNames = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  const dayNames = ['L','M','M','G','V','S','D'];

  // Determine level: 3 = today or yesterday, 2 = within last week, 1 = older
  function getLevel(date) {
    const key = date.toISOString().slice(0,10);
    if (!wateredDates.has(key)) return 0;
    const diffDays = Math.floor((today - date) / 86400000);
    if (diffDays <= 1) return 3;
    if (diffDays <= 7) return 2;
    return 1;
  }

  // Month label positions
  let monthLabels = [];
  cols.forEach((col, wi) => {
    const firstDay = col[0];
    if (wi === 0 || firstDay.getDate() <= 7) {
      monthLabels.push({ wi, label: monthNames[firstDay.getMonth()] });
    }
  });
  // Deduplicate same month
  monthLabels = monthLabels.filter((m, i) => i === 0 || m.label !== monthLabels[i-1].label);

  // Build HTML
  const CELL = 10, GAP = 2;
  const colWidth = CELL + GAP;

  // Month row (relative positioning)
  let monthRowHtml = `<div class="heatmap-months" style="position:relative;height:14px;padding-left:22px;">`;
  monthLabels.forEach(({ wi, label }) => {
    const left = 22 + wi * colWidth;
    monthRowHtml += `<span class="heatmap-month-label" style="left:${left}px">${label}</span>`;
  });
  monthRowHtml += '</div>';

  // Cells grid
  let colsHtml = cols.map(col => {
    const cells = col.map(date => {
      const isFuture = date > today;
      if (isFuture) return `<div class="heatmap-cell future"></div>`;
      const key = date.toISOString().slice(0,10);
      const isToday = date.getTime() === today.getTime();
      const lvl = getLevel(date);
      const cls = [
        'heatmap-cell',
        lvl > 0 ? `lvl-${lvl}` : '',
        isToday ? 'today' : ''
      ].filter(Boolean).join(' ');
      const label = date.toLocaleDateString('it-IT', {day:'numeric', month:'short', year:'numeric'});
      const watered = wateredDates.has(key);
      return `<div class="${cls}" data-date="${key}" data-label="${label}" data-watered="${watered}" onmouseenter="showHmTip(this,event)" onmouseleave="hideHmTip()" ontouchstart="showHmTip(this,event)" ontouchend="hideHmTip()"></div>`;
    }).join('');
    return `<div class="heatmap-col">${cells}</div>`;
  }).join('');

  const rowsHtml = `<div class="heatmap-rows">
    <div class="heatmap-day-labels">
      ${dayNames.map((d,i) => `<div class="heatmap-day-label">${i % 2 === 0 ? d : ''}</div>`).join('')}
    </div>
    <div class="heatmap-cols">${colsHtml}</div>
  </div>`;

  const footer = `<div class="heatmap-footer">
    meno
    <div class="heatmap-legend-cell"></div>
    <div class="heatmap-legend-cell lvl-1"></div>
    <div class="heatmap-legend-cell lvl-2"></div>
    <div class="heatmap-legend-cell lvl-3"></div>
    più
  </div>`;

  return `<div class="heatmap-wrap"><div class="heatmap-inner">${monthRowHtml}${rowsHtml}${footer}</div></div>`;
}

function showHmTip(el, e) {
  const tip = document.getElementById('hm-tooltip');
  const watered = el.dataset.watered === 'true';
  tip.textContent = watered ? `💧 ${el.dataset.label}` : el.dataset.label;
  tip.classList.add('show');
  positionTip(e);
}
function hideHmTip() {
  document.getElementById('hm-tooltip').classList.remove('show');
}
function positionTip(e) {
  const tip = document.getElementById('hm-tooltip');
  const x = (e.touches ? e.touches[0].clientX : e.clientX);
  const y = (e.touches ? e.touches[0].clientY : e.clientY);
  tip.style.left = (x - tip.offsetWidth/2) + 'px';
  tip.style.top = (y - 32) + 'px';
}
document.addEventListener('mousemove', e => {
  const tip = document.getElementById('hm-tooltip');
  if (tip.classList.contains('show')) positionTip(e);
});


let toastTimer = null;
function showToast(msg, undoFn) {
  const t = document.getElementById('toast');
  const m = document.getElementById('toast-msg');
  if (toastTimer) clearTimeout(toastTimer);
  m.textContent = msg;
  const old = t.querySelector('.toast-undo');
  if (old) old.remove();
  if (undoFn) {
    const btn = document.createElement('button');
    btn.className = 'toast-undo'; btn.textContent = 'Annulla';
    btn.onclick = () => { undoFn(); hideToast(); };
    t.appendChild(btn);
  }
  t.classList.add('show');
  toastTimer = setTimeout(hideToast, 4000);
}
function hideToast() {
  const t = document.getElementById('toast');
  t.classList.remove('show');
  const btn = t.querySelector('.toast-undo');
  if (btn) setTimeout(() => btn.remove(), 300);
}

// =====================
// GOOGLE DRIVE SYNC
// =====================

function updateSyncUI() {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  const btn = document.getElementById('btn-sync');
  if (accessToken && googleUser) {
    dot.className = 'sync-dot on';
    lbl.textContent = googleUser.name ? googleUser.name.split(' ')[0] : 'Drive';
    btn.className = 'btn-sync connected';
  } else {
    dot.className = 'sync-dot';
    lbl.textContent = 'Drive';
    btn.className = 'btn-sync';
  }
}

function openDrivePanel() {
  const content = document.getElementById('drive-content');
  if (accessToken && googleUser) {
    const avatarHtml = googleUser.picture
      ? `<img src="${googleUser.picture}" alt="">`
      : `<span>${(googleUser.name||'?')[0]}</span>`;
    content.innerHTML = `
      <div class="drive-user">
        <div class="drive-avatar">${avatarHtml}</div>
        <div>
          <div class="drive-name">${googleUser.name || 'Utente Google'}</div>
          <div class="drive-email">${googleUser.email || ''}</div>
        </div>
      </div>
      <div class="drive-actions">
        <button class="btn-drive btn-drive-upload" onclick="driveUpload()">☁️ Salva su Drive</button>
        <p class="drive-hint">Sovrascrive il backup su Drive con i dati attuali del telefono.</p>
        <div class="drive-sep"></div>
        <button class="btn-drive btn-drive-download" onclick="driveDownload()">📥 Carica da Drive</button>
        <p class="drive-hint">Sostituisce i dati attuali con quelli salvati su Drive.</p>
        <div class="drive-sep"></div>
        <button class="btn-drive btn-drive-logout" onclick="driveLogout()">Disconnetti account</button>
      </div>`;
  } else {
    content.innerHTML = `
      <h2 style="margin-bottom:0.75rem">Sincronizza con Drive</h2>
      <p style="font-size:14px;color:var(--gray-600);line-height:1.6;margin-bottom:1.25rem">
        Collegando il tuo Google Account puoi salvare le piante su Drive e recuperarle su qualsiasi dispositivo.
      </p>
      <div class="drive-actions">
        <button class="btn-drive btn-drive-upload" onclick="driveLogin()" style="gap:10px">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Accedi con Google
        </button>
        <p class="drive-hint">I tuoi dati vengono salvati in una cartella privata dell'app su Drive, non visibile ad altre app.</p>
      </div>`;
  }
  document.getElementById('drive-overlay').classList.add('open');
}

function closeDrivePanel() { document.getElementById('drive-overlay').classList.remove('open'); }
function handleDriveOverlayClick(e) { if (e.target === document.getElementById('drive-overlay')) closeDrivePanel(); }

function driveLogin() {
  if (!tokenClient) {
    showToast('⚠️ Google non ancora caricato, riprova');
    return;
  }
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function driveLogout() {
  if (accessToken) google.accounts.oauth2.revoke(accessToken, () => {});
  accessToken = null; googleUser = null; driveFileId = null;
  localStorage.removeItem('gd_token');
  localStorage.removeItem('gd_user');
  updateSyncUI(); closeDrivePanel();
  showToast('Account disconnesso');
}

async function driveUpload() {
  if (!accessToken) return;
  setSyncing(true);
  closeDrivePanel();
  try {
    const data = JSON.stringify(plants);
    if (!driveFileId) driveFileId = await findDriveFile();
    if (driveFileId) {
      await updateDriveFile(driveFileId, data);
    } else {
      driveFileId = await createDriveFile(data);
    }
    showToast('☁️ Salvato su Drive!');
  } catch(e) {
    if (e.status === 401) { accessToken = null; updateSyncUI(); showToast('Sessione scaduta, riconnettiti'); }
    else showToast('Errore durante il salvataggio');
  }
  setSyncing(false);
}

async function driveDownload() {
  if (!accessToken) return;
  setSyncing(true);
  closeDrivePanel();
  try {
    if (!driveFileId) driveFileId = await findDriveFile();
    if (!driveFileId) { showToast('Nessun backup trovato su Drive'); setSyncing(false); return; }
    const data = await readDriveFile(driveFileId);
    const imported = JSON.parse(data);
    if (Array.isArray(imported)) {
      plants = imported;
      save(); render();
      showToast(`📥 Caricate ${plants.length} piante da Drive`);
    }
  } catch(e) {
    if (e.status === 401) { accessToken = null; updateSyncUI(); showToast('Sessione scaduta, riconnettiti'); }
    else showToast('Errore durante il caricamento');
  }
  setSyncing(false);
}

function setSyncing(on) {
  const dot = document.getElementById('sync-dot');
  const btn = document.getElementById('btn-sync');
  if (on) { dot.className = 'sync-dot spinning'; btn.classList.add('syncing'); }
  else { updateSyncUI(); btn.classList.remove('syncing'); }
}

// Drive API calls
async function findDriveFile() {
  const res = await gfetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${DRIVE_FILE_NAME}'&fields=files(id)`);
  const json = await res.json();
  if (!res.ok) throw { status: res.status };
  return json.files && json.files.length > 0 ? json.files[0].id : null;
}

async function createDriveFile(data) {
  const meta = { name: DRIVE_FILE_NAME, parents: ['appDataFolder'] };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
  form.append('file', new Blob([data], { type: 'application/json' }));
  const res = await gfetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', { method: 'POST', body: form });
  if (!res.ok) throw { status: res.status };
  const json = await res.json();
  return json.id;
}

async function updateDriveFile(fileId, data) {
  const res = await gfetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: data
  });
  if (!res.ok) throw { status: res.status };
}

async function readDriveFile(fileId) {
  const res = await gfetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
  if (!res.ok) throw { status: res.status };
  return res.text();
}

function gfetch(url, opts = {}) {
  opts.headers = opts.headers || {};
  opts.headers['Authorization'] = `Bearer ${accessToken}`;
  return fetch(url, opts);
}

// Google Identity Services init
window.addEventListener('load', () => {
  const interval = setInterval(() => {
    if (typeof google === 'undefined' || !google.accounts) return;
    clearInterval(interval);

    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: async (resp) => {
        if (resp.error) { showToast('Accesso negato'); return; }
        accessToken = resp.access_token;
        localStorage.setItem('gd_token', accessToken);
        // Fetch user info
        try {
          const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
            headers: { Authorization: `Bearer ${accessToken}` }
          });
          const u = await r.json();
          googleUser = { name: u.name, email: u.email, picture: u.picture };
          localStorage.setItem('gd_user', JSON.stringify(googleUser));
        } catch(e) { googleUser = {}; }
        updateSyncUI();
        showToast('✅ Connesso a Google Drive!');
        // Auto-find file
        try { driveFileId = await findDriveFile(); } catch(e) {}
      }
    });

    // Restore session silently if token still present
    if (accessToken) {
      updateSyncUI();
      findDriveFile().then(id => { driveFileId = id; }).catch(() => {});
    }
  }, 200);
});

// --- Init ---
load(); render(); updateSyncUI();
